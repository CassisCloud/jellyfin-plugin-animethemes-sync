changelog: >
  - Restores Library Browser scroll position after returning from details and always opens details at the top, including on mobile.
  - Adds reliable infinite scrolling to Library Browser.
  - Starts Season Finder downloads as settings-aware per-theme queue jobs with series, season, theme, and song titles.
  - Adds retry controls for failed jobs in the download queue and matching theme cards.
  - Adds completed/cancelled history cleanup while preserving failed jobs for retry.
  - Keeps the download manager visible and shows No active downloads only when the queue is empty.
