changelog: >
  - Restores the previous Library Browser position when returning from details.
  - Adds infinite scrolling to Library Browser.
  - Improves Save & Download so Season Finder downloads are shown per song.
  - Keeps the download queue visible and shows No active downloads when it is empty.
  - Adds Clear history for Completed and Cancelled downloads.
  - Adds Retry for Failed downloads in the queue and matching song cards.
