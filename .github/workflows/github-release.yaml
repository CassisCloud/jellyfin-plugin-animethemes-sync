name: '📦 Release to GitHub'

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check-and-sync-version:
    runs-on: ubuntu-latest
    outputs:
      synced: ${{ steps.sync_version.outputs.synced }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Version
        id: get_version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Sync and Validate build.yaml Version
        id: sync_version
        run: |
          set -euo pipefail
          
          # build.yaml の現在のバージョンを取得
          BUILD_VERSION="$(python - <<'PY'
          from pathlib import Path
          for line in Path("build.yaml").read_text(encoding="utf-8").splitlines():
              if line.startswith("version:"):
                  print(line.split(":", 1)[1].strip().strip('"').strip("'"))
                  break
          else:
              raise SystemExit("build.yaml version was not found")
          PY
          )"
          
          echo "build.yaml version: ${BUILD_VERSION}"
          echo "Tag version: ${VERSION}"
          
          if [ "${BUILD_VERSION}" != "${VERSION}" ]; then
            echo "Version mismatch detected. Updating build.yaml to version ${VERSION}..."
            
            # build.yaml を更新
            python -c "
          import os
          from pathlib import Path
          p = Path('build.yaml')
          content = p.read_text(encoding='utf-8')
          lines = []
          for line in content.splitlines():
              if line.startswith('version:'):
                  lines.append('version: \"' + '${{ env.VERSION }}' + '\"')
              else:
                  lines.append(line)
          p.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          "
            
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            git add build.yaml
            git commit -m "chore: auto-bump version to ${VERSION} in build.yaml [skip ci]"
            
            # main ブランチへプッシュ
            git push origin HEAD:main
            
            # タグを新しいコミットに移動して force push
            git tag -f "v${VERSION}"
            git push origin "v${VERSION}" --force
            
            echo "Successfully updated build.yaml and moved tag v${VERSION}."
            echo "synced=true" >> $GITHUB_OUTPUT
          else
            echo "Versions match. Proceeding with build."
            echo "synced=false" >> $GITHUB_OUTPUT
          fi

  build-and-release:
    needs: check-and-sync-version
    if: needs.check-and-sync-version.outputs.synced == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore Jellyfin.Plugin.AnimeThemesSync.sln -nologo /p:NuGetAudit=false

      - name: Extract Version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Extracted version: $VERSION"

      - name: Generate Release Notes
        run: |
          set -euo pipefail
          git fetch --force --tags
          TAG_MESSAGE="$(git for-each-ref "refs/tags/${GITHUB_REF_NAME}" --format='%(contents)' | sed '/^[[:space:]]*$/d' || true)"

          if [ -n "${TAG_MESSAGE}" ]; then
            printf "%s\n" "${TAG_MESSAGE}" > release-notes.md
            echo "Using annotated tag message as release notes."
          else
            PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)"
            {
              echo "## Changes"
              if [ -n "${PREV_TAG}" ]; then
                git log --pretty=format:'- %s (%h)' "${PREV_TAG}..${GITHUB_REF_NAME}"
              else
                git log --pretty=format:'- %s (%h)'
              fi
            } > release-notes.md
            echo "Using git log as release notes."
          fi

          cat release-notes.md

      - name: Build Jellyfin
        run: dotnet build Jellyfin.Plugin.AnimeThemesSync/Jellyfin.Plugin.AnimeThemesSync.csproj -c Release --no-restore -p:Version=${{ env.VERSION }} -p:ContinuousIntegrationBuild=true -nologo /p:NuGetAudit=false

      - name: Build Emby
        run: dotnet build Emby.Plugin.AnimeThemesSync/Emby.Plugin.AnimeThemesSync.csproj -c Release --no-restore -p:Version=${{ env.VERSION }} -p:ContinuousIntegrationBuild=true -nologo /p:NuGetAudit=false

      - name: Create Jellyfin Zip Archive
        run: |
          mkdir -p dist/jellyfin
          cp Jellyfin.Plugin.AnimeThemesSync/bin/Release/net9.0/Jellyfin.Plugin.AnimeThemesSync.dll dist/jellyfin/
          cp Jellyfin.Plugin.AnimeThemesSync/bin/Release/net9.0/AnimeThemesSync.Shared.dll dist/jellyfin/ || true
          (cd dist/jellyfin && zip -r ../../Jellyfin.Plugin.AnimeThemesSync.zip .)

      - name: Create Emby Zip Archive
        run: |
          mkdir -p dist/emby
          cp Emby.Plugin.AnimeThemesSync/bin/Release/net8.0/Emby.Plugin.AnimeThemesSync.dll dist/emby/
          cp Emby.Plugin.AnimeThemesSync/bin/Release/net8.0/AnimeThemesSync.Shared.dll dist/emby/ || true
          (cd dist/emby && zip -r ../../Emby.Plugin.AnimeThemesSync.zip .)

      - name: Generate MD5
        run: |
          md5sum Jellyfin.Plugin.AnimeThemesSync.zip > Jellyfin.Plugin.AnimeThemesSync.zip.md5
          md5sum Emby.Plugin.AnimeThemesSync.zip > Emby.Plugin.AnimeThemesSync.zip.md5

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
             Jellyfin.Plugin.AnimeThemesSync.zip
             Jellyfin.Plugin.AnimeThemesSync.zip.md5
             Emby.Plugin.AnimeThemesSync.zip
             Emby.Plugin.AnimeThemesSync.zip.md5
          body_path: release-notes.md
