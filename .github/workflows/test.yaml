name: '🧪 Test Plugin'

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
      - name: Restore
        run: dotnet restore Jellyfin.Plugin.AnimeThemesSync.sln -nologo /p:NuGetAudit=false
      - name: Build
        run: dotnet build Jellyfin.Plugin.AnimeThemesSync.sln --configuration Release --no-restore -nologo /p:NuGetAudit=false
      - name: Test
        shell: bash
        run: |
          set +e
          dotnet test Jellyfin.Plugin.AnimeThemesSync.Tests/Jellyfin.Plugin.AnimeThemesSync.Tests.csproj --configuration Release --no-restore --verbosity normal --logger "trx;LogFileName=test-results.trx" 2>&1 | tee test-output.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$({
              echo 'Test command failed.'
              grep -A 20 -B 5 -E 'Failed Jellyfin|\\[FAIL\\]|Error Message|Stack Trace' test-output.log || tail -n 120 test-output.log
            } | sed 's/%/%25/g; s/\r/%0D/g; s/$/%0A/g' | tr -d '\n')
            echo "::error::$message"
          fi
          exit "$status"
